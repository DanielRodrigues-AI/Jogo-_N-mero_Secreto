<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/index.css">
    <title>Jogo do Número Secreto</title>
</head>

<body class="dash-body">
    <header class="dash-header">
        <h1 class="header-h1">Jogo do Número Secreto</h1>
    </header>
    <main class="dash-main">
        <section class="dash-section">
            <div class="container">
                <div class="numeros">
                    <h2>Digite um número entre <span class="numeroDe">1</span> e <span class="numeroAte">100</span></h2>

                    <input class="input-number" type="text" id="numero" placeholder="Digite um número entre 1 e 100"
                        maxlength="3">
                    <button id="botao-verificar" class="botao" onclick="verificar()">Enviar</button>
                    <button id="botao-novo" class="botao" onclick="novoJogo()">Novo Jogo</button>
                </div>
                <div class=texto>
                    <div class="chute">chutes:</div>
                    <div class="tentativas">tentativas:</div>
                    <div class="resultado">resultado:</div>
                </div>
            </div>
        </section>
    </main>
    <script src="./assets/js/index.js"></script>
</body>

</html>
